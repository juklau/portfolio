services:
  web:
    image: httpd:2.4
    container_name: portfolio-klaudia-web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./:/usr/local/apache2/htdocs/:ro
    networks:
      - admin_proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: admin_proxy

      traefik.http.middlewares.portfolio-juhasz-https-redirect.redirectregex.regex: "^http://portfolio-juhasz\\.iris\\.a3n\\.fr(.*)"
      traefik.http.middlewares.portfolio-juhasz-https-redirect.redirectregex.replacement: "https://portfolio-juhasz.iris.a3n.fr:4433$$1"
      traefik.http.middlewares.portfolio-juhasz-https-redirect.redirectregex.permanent: "true"

      traefik.http.routers.portfolio-juhasz-http.entrypoints: web
      traefik.http.routers.portfolio-juhasz-http.rule: "Host(`portfolio-juhasz.iris.a3n.fr`)"
      traefik.http.routers.portfolio-juhasz-http.middlewares: portfolio-juhasz-https-redirect
      traefik.http.routers.portfolio-juhasz-http.service: portfolio-juhasz-svc

      traefik.http.routers.portfolio-juhasz.entrypoints: websecure
      traefik.http.routers.portfolio-juhasz.rule: "Host(`portfolio-juhasz.iris.a3n.fr`)"
      traefik.http.routers.portfolio-juhasz.tls: "true"
      traefik.http.routers.portfolio-juhasz.tls.certresolver: letsencrypt
      traefik.http.routers.portfolio-juhasz.service: portfolio-juhasz-svc
      traefik.http.routers.portfolio-juhasz.middlewares: portfolio-juhasz-security

      traefik.http.services.portfolio-juhasz-svc.loadbalancer.server.port: "80"

      traefik.http.middlewares.portfolio-juhasz-security.headers.stsSeconds: "31536000"
      traefik.http.middlewares.portfolio-juhasz-security.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.portfolio-juhasz-security.headers.stsPreload: "true"
      traefik.http.middlewares.portfolio-juhasz-security.headers.forceSTSHeader: "true"
      traefik.http.middlewares.portfolio-juhasz-security.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.portfolio-juhasz-security.headers.browserXssFilter: "true"

networks:
  admin_proxy:
    external: true
